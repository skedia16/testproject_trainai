<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F2EB;
    --surface: #FDFCF8;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.14);
    --text: #1A1814;
    --muted: #7A7670;
    --faint: #B0ADA7;
    --accent: #C4683A;
    --accent-light: #F5EDE7;
    --tag-ai-bg: #E8EDF5; --tag-ai: #2B4A7A;
    --tag-vc-bg: #E8F0EC; --tag-vc: #1F5038;
    --tag-india-bg: #F5EDDF; --tag-india: #7A4A1A;
  }

  body {
    font-family: 'DM Sans', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  .masthead {
    border-bottom: 1px solid var(--border-strong);
    background: var(--surface);
    padding: 0 2rem;
  }

  .masthead-inner {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 0 1.25rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
  }

  .masthead-eyebrow {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 4px;
  }

  .masthead-title {
    font-family: 'DM Serif Display', serif;
    font-size: 42px;
    line-height: 1;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .masthead-title em {
    color: var(--accent);
    font-style: italic;
  }

  .masthead-date {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }

  .refresh-btn {
    font-family: 'DM Sans', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 8px 18px;
    border: 1px solid var(--border-strong);
    border-radius: 100px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    white-space: nowrap;
    margin-bottom: 4px;
  }

  .refresh-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .nav-bar {
    max-width: 860px;
    margin: 0 auto;
    padding: 0.75rem 0 0;
    display: flex;
    gap: 0;
    border-top: 1px solid var(--border);
  }

  .nav-tab {
    font-family: 'DM Sans', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 18px 10px;
    border: none;
    background: transparent;
    color: var(--faint);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }

  .nav-tab:hover { color: var(--muted); }
  .nav-tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 500; }

  .main {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 2rem 4rem;
  }

  .feed { display: flex; flex-direction: column; gap: 0; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 10px;
    cursor: default;
    transition: border-color 0.15s, transform 0.15s;
    animation: fadeUp 0.4s ease both;
  }

  .card:hover { border-color: var(--border-strong); transform: translateY(-1px); }
  .card.clickable { cursor: pointer; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:nth-child(2) { animation-delay: 0.05s; }
  .card:nth-child(3) { animation-delay: 0.1s; }
  .card:nth-child(4) { animation-delay: 0.15s; }
  .card:nth-child(5) { animation-delay: 0.2s; }
  .card:nth-child(6) { animation-delay: 0.25s; }
  .card:nth-child(7) { animation-delay: 0.3s; }
  .card:nth-child(8) { animation-delay: 0.35s; }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 100px;
  }

  .tag-ai { background: var(--tag-ai-bg); color: var(--tag-ai); }
  .tag-startups { background: var(--tag-vc-bg); color: var(--tag-vc); }
  .tag-india { background: var(--tag-india-bg); color: var(--tag-india); }

  .card-source {
    font-size: 12px;
    color: var(--faint);
  }

  .card-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border-strong); }
  .card-time { font-size: 12px; color: var(--faint); }

  .card h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    font-weight: 400;
    line-height: 1.35;
    color: var(--text);
    margin-bottom: 7px;
  }

  .card p {
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.65;
  }

  .card-link {
    display: inline-block;
    font-size: 12px;
    color: var(--accent);
    margin-top: 10px;
    text-decoration: none;
    font-weight: 500;
  }

  .card-link:hover { text-decoration: underline; }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--faint);
    font-size: 14px;
  }

  .status-bar {
    font-size: 11px;
    color: var(--faint);
    text-align: center;
    margin-top: 1.5rem;
    letter-spacing: 0.04em;
  }

  .notice {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 2rem;
  }

  .notice-inner {
    background: var(--accent-light);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--muted);
    margin-top: 14px;
  }

  .notice-inner a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .notice-inner a:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    .masthead-title { font-size: 30px; }
    .main { padding: 1.5rem 1rem 3rem; }
    .masthead-inner { padding: 1.5rem 0 1rem; }
    .masthead { padding: 0 1rem; }
    .notice { padding: 0 1rem; }
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-inner">
    <div class="masthead-left">
      <p class="masthead-eyebrow">Shreya's daily brief</p>
      <h1 class="masthead-title">Morning <em>Brief</em></h1>
      <p class="masthead-date" id="dateline"></p>
    </div>
    <button class="refresh-btn" id="refreshBtn" type="button">
      <span id="refreshIcon">↻</span> Refresh
    </button>
  </div>
  <nav class="nav-bar">
    <button class="nav-tab active" onclick="filterTab('all', this)">All</button>
    <button class="nav-tab" onclick="filterTab('ai', this)">AI & tech</button>
    <button class="nav-tab" onclick="filterTab('startups', this)">Startups & VC</button>
    <button class="nav-tab" onclick="filterTab('india', this)">India business</button>
  </nav>
</header>

<div class="notice">
  <div class="notice-inner" id="notice">
    Loading…
  </div>
</div>

<main class="main">
  <div class="feed" id="feed"></div>
  <p class="status-bar" id="statusBar"></p>
  <noscript>
    <div class="empty-state">JavaScript is required to display the digest cards.</div>
  </noscript>
</main>

<script>
const STATIC_TOPICS = {
  ai: { id: 'ai', label: 'AI & tech', tagClass: 'tag-ai' },
  startups: { id: 'startups', label: 'Startups & VC', tagClass: 'tag-startups' },
  india: { id: 'india', label: 'India business', tagClass: 'tag-india' }
};

// This page does not fetch live news in the browser (no API keys, no CORS/RSS complexity).
// Instead, it’s meant to be regenerated by the Daily Shreya Digest automation each morning.
const BUILD_INFO = {
  generatedAtIso: '2026-04-11T18:45:00+05:30',
  timezoneLabel: 'IST'
};

const ARTICLES = [
  // AI & tech
  {
    topicId: 'ai',
    title: 'Anthropic withholds “Mythos Preview” as cyber-capable AI raises risk concerns',
    summary: 'Anthropic says a next-gen model can autonomously find and exploit severe software vulnerabilities, so it’s limiting access rather than releasing it broadly. OpenAI is also signaling tighter controls for models with similar offensive-security capabilities.',
    source: 'Axios',
    url: 'https://www.axios.com/2026/04/10/anthropic-mythos-preview-cybersecurity',
    published: 'Apr 10'
  },
  {
    topicId: 'ai',
    title: 'TSMC says Q1 revenue jumped 35% year-on-year on AI demand, beating forecasts',
    summary: 'TSMC reported first-quarter revenue of T$1.134 trillion, up 35.3% year-on-year, as AI-driven demand for advanced chips stayed strong. The result topped analyst expectations, reinforcing the view that AI workloads are still pulling forward semiconductor spend.',
    source: 'Reuters',
    url: 'https://www.investing.com/news/stock-market-news/tsmc-says-q1-revenue-jumped-353-on-year-outpaces-forecast-3999689',
    published: 'Apr 10'
  },
  {
    topicId: 'ai',
    title: 'U.S. BIS extends timeline for “Authorized IC Designers” to Dec 31, 2026',
    summary: 'The Bureau of Industry and Security extended the window during which certain companies are treated as authorized IC designers that can overcome a presumption of some license requirements. BIS says the extension provides more time for applications and for processing.',
    source: 'Bureau of Industry and Security (U.S. Dept. of Commerce)',
    url: 'https://media.bis.gov/',
    published: 'Apr 7'
  },
  {
    topicId: 'ai',
    title: 'U.S. lawmakers propose “MATCH Act” to curb advanced chip flows to China',
    summary: 'A bipartisan bill would create tougher controls aimed at keeping leading-edge AI chips and manufacturing tools from reaching China. The proposal reflects intensifying U.S. focus on compute as a strategic resource and on tightening export-control enforcement.',
    source: 'Tom’s Hardware',
    url: 'https://www.tomshardware.com/tech-industry/us-lawmakers-introduce-match-act-to-curb-chinese-access-to-advanced-ai-chips',
    published: 'Apr 7'
  },

  // Startups & VC
  {
    topicId: 'startups',
    title: 'Eclipse raises a $1.3B fund to back and “build” physical-AI startups',
    summary: 'Eclipse says it has $1.3 billion in fresh capital split across early-stage incubation and growth-oriented pools. The fund thesis focuses on “physical AI” across transportation, energy, infrastructure, compute, and defense.',
    source: 'TechCrunch',
    url: 'https://techcrunch.com/2026/04/07/vc-eclipse-has-a-new-1-3b-to-back-and-build-physical-ai-startups/',
    published: 'Apr 7'
  },
  {
    topicId: 'startups',
    title: 'KreditBee becomes a unicorn after raising $250M from Advent International',
    summary: 'Consumer lending startup KreditBee says a $250 million round led by Advent values it at about $1 billion. The deal is a notable late-stage funding event in India’s fintech ecosystem.',
    source: 'The Economic Times',
    url: 'https://economictimes.indiatimes.com/tech/funding/kreditbee-turns-unicorn-after-raising-250-million-from-advent-international/articleshow/120125933.cms',
    published: 'Apr 8'
  },
  {
    topicId: 'startups',
    title: 'Q1 2026 fintech funding climbs, driven by megadeals and IPO optimism',
    summary: 'Crunchbase reports Q1 2026 fintech investment rose to $35.2B globally, with large rounds shaping the totals. The report notes improving IPO sentiment alongside an uneven venture market outside AI-heavy sectors.',
    source: 'Crunchbase News',
    url: 'https://news.crunchbase.com/fintech/fintech-funding-megadeals-q1-2026/',
    published: 'Apr 10'
  },
  {
    topicId: 'startups',
    title: 'Crunchbase: Q1 2026 shatters venture funding records as AI boom drives $300B',
    summary: 'Crunchbase says global startup funding hit $300B in Q1 2026, with capital concentrated in AI and frontier-lab deals. The piece argues that AI compute spend is reshaping venture totals and the distribution of megadeals.',
    source: 'Crunchbase News',
    url: 'https://news.crunchbase.com/venture/record-breaking-funding-ai-global-q1-2026/',
    published: 'Apr 1'
  },

  // India business
  {
    topicId: 'india',
    title: 'RBI announces reforms to ease MSME access to credit; also loosens project finance norms',
    summary: 'The RBI announced measures aimed at making it easier for MSMEs to borrow, including changes to priority sector lending classification. It also adjusted project finance norms, a move that banks and borrowers will watch for the cost and availability of long-term capital.',
    source: 'Times of India',
    url: 'https://timesofindia.indiatimes.com/business/india-business/rbi-announces-reforms-to-ease-msme-access-to-credit-also-loosens-project-finance-norms/articleshow/120127597.cms',
    published: 'Apr 8'
  },
  {
    topicId: 'india',
    title: 'RBI keeps policy rate unchanged; flags inflation-growth tradeoffs',
    summary: 'The RBI’s monetary policy decision kept rates steady, as policymakers weighed inflation risks against growth support. Markets typically focus on the stance guidance and liquidity signals for what it implies for borrowing costs ahead.',
    source: 'Business Standard',
    url: 'https://www.business-standard.com/economy/news/rbi-monetary-policy-announcement-april-2026-takeaways-125040901038_1.html',
    published: 'Apr 8'
  },
  {
    topicId: 'india',
    title: 'Delhi draft EV policy proposes scrapping CNG auto registrations from Aug 2026',
    summary: 'A draft Delhi EV policy proposes ending registration of new CNG autos from August 2026 and also includes other electrification measures. If adopted, it would meaningfully shift fleet economics and last-mile mobility options in the capital.',
    source: 'Times of India',
    url: 'https://timesofindia.indiatimes.com/city/delhi/draft-ev-policy-proposes-scrapping-cng-auto-registrations-from-aug-2026/articleshow/120188082.cms',
    published: 'Apr 11'
  },
  {
    topicId: 'india',
    title: 'Rupee falls 43 paise to 85.95/$ as crude oil climbs and risk sentiment weakens',
    summary: 'The rupee weakened against the U.S. dollar as oil prices rose and broader risk appetite softened. Currency moves like this often flow through to import costs and inflation expectations, especially for energy-sensitive sectors.',
    source: 'Business Standard',
    url: 'https://www.business-standard.com/markets/news/rupee-falls-43-paise-to-close-at-85-95-against-us-dollar-on-rising-crude-oil-prices-125040901020_1.html',
    published: 'Apr 9'
  }
];

let allArticles = [];
let activeTab = 'all';
let fetchedAt = null;

function setDateline() {
  const now = new Date();
  document.getElementById('dateline').textContent = now.toLocaleDateString('en-IN', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
}

function normalizeArticles(articles) {
  return (articles || []).map(a => {
    const t = STATIC_TOPICS[a.topicId];
    return {
      title: a.title || 'Untitled',
      summary: a.summary || '',
      source: a.source || 'Unknown',
      url: a.url || '',
      published: a.published || '',
      topicId: a.topicId,
      topicLabel: t ? t.label : 'Other',
      tagClass: t ? t.tagClass : 'tag-ai',
      hours_ago: a.hours_ago ?? null
    };
  });
}

function renderFeed() {
  const feed = document.getElementById('feed');
  const filtered = activeTab === 'all' ? allArticles : allArticles.filter(a => a.topicId === activeTab);

  if (!filtered.length) {
    feed.innerHTML = '<div class="empty-state">No stories loaded yet.</div>';
    return;
  }

  feed.innerHTML = filtered.map(a => `
    <div class="card ${a.url ? 'clickable' : ''}" ${a.url ? `onclick="window.open('${a.url}','_blank')"` : ''}>
      <div class="card-meta">
        <span class="tag ${a.tagClass}">${a.topicLabel}</span>
        <span class="card-source">${escapeHtml(a.source)}</span>
        ${(a.published || a.hours_ago != null) ? `<span class="card-dot"></span><span class="card-time">${escapeHtml(a.published || `${a.hours_ago}h ago`)}</span>` : ''}
      </div>
      <h3>${escapeHtml(a.title)}</h3>
      <p>${escapeHtml(a.summary)}</p>
      ${a.url ? `<a class="card-link" href="${a.url}" target="_blank" rel="noreferrer" onclick="event.stopPropagation()">Read →</a>` : ''}
    </div>
  `).join('');

  if (fetchedAt) {
    document.getElementById('statusBar').textContent =
      `Updated ${fetchedAt.toLocaleString('en-IN', { hour: '2-digit', minute: '2-digit' })} · ${filtered.length} items`;
  }
}

function filterTab(id, el) {
  activeTab = id;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderFeed();
}

function hardRefresh() {
  // Bust caches (useful on hosted sites) while preserving the current URL.
  const url = new URL(window.location.href);
  url.searchParams.set('_r', String(Date.now()));
  window.location.replace(url.toString());
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function init() {
  setDateline();
  allArticles = normalizeArticles(ARTICLES);
  fetchedAt = new Date();
  try {
    const generated = BUILD_INFO.generatedAtIso ? new Date(BUILD_INFO.generatedAtIso) : null;
    const generatedLabel = generated && !isNaN(generated.getTime())
      ? generated.toLocaleString('en-IN', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
      : null;
    document.getElementById('notice').textContent =
      generatedLabel
        ? `Last generated: ${generatedLabel} (${BUILD_INFO.timezoneLabel || 'local time'}) · Refresh to see updates`
        : 'Refresh to see the latest updated file on disk';
  } catch {
    document.getElementById('notice').textContent = 'Refresh to see the latest updated file on disk';
  }
  renderFeed();
}

init();

document.getElementById('refreshBtn')?.addEventListener('click', hardRefresh);
</script>
</body>
</html>
