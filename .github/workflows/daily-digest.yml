name: Daily Digest

on:
  schedule:
    # 8:00 AM IST == 2:30 AM UTC
    - cron: "30 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser beautifulsoup4

      - name: Update digest from RSS
        env:
          DIGEST_HTML_PATH: index.html
          DIGEST_ITEMS_PER_TOPIC: "4"
        run: python scripts/update_digest.py

      - name: Commit + push if changed
        env:
          TZ: Asia/Kolkata
        run: |
          if git diff --quiet; then
            echo "No changes; skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Daily digest: $(date +'%Y-%m-%d')"
          git push

